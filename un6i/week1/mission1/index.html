<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Todo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="todo">
    <h1 class="todo__title">YONG TODO</h1>

    <div class="todo__input-box">
      <input id="todo-input" class="todo__input" type="text" placeholder="할 일 입력">
      <button id="add-btn" class="todo__add-btn">할 일 추가</button>
    </div>

    <div class="todo__container">
      <div class="todo__column">
        <h2>할 일</h2>
        <ul id="todo-list"></ul>
      </div>

      <div class="todo__column">
        <h2>완료</h2>
        <ul id="completed-list"></ul>
      </div>
    </div>
  </div>

  <script src="./dist/main.js"></script>
</body>
</html>
